name: iOS Test Build

on:
  push:
    branches:
      - develop
      - 'feature/*'
      - 'bugfix/*'
      - 'hotfix/*'
  workflow_dispatch:

jobs:
  build:
    name: Build and Archive
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: iosApp/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('iosApp/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Decode API Keys
        run: echo ${{ secrets.APIKEY_PROPERTIES }} | base64 --decode > ./local.properties

      - name: Assemble shared module
        run: ./gradlew :composeApp:assembleIosArm64

      - name: Install CocoaPods
        run: cd iosApp && pod install

      - name: Create Keychain
        run: |
          security create-keychain -p ${{ secrets.KEYCHAIN_PASSWORD }} build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p ${{ secrets.KEYCHAIN_PASSWORD }} build.keychain
          security set-keychain-settings -t 3600

      - name: Decode and Import Certificate
        run: |
          echo ${{ secrets.IOS_CERTIFICATE_BASE64 }} | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P ${{ secrets.IOS_CERTIFICATE_PASSWORD }} -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k ${{ secrets.KEYCHAIN_PASSWORD }} build.keychain
          rm certificate.p12

      - name: Decode and Install Provisioning Profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }} | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/ci_profile.mobileprovision

      - name: Decode Export Options
        run: echo ${{ secrets.IOS_EXPORT_OPTIONS_PLIST }} | base64 --decode > ExportOptions.plist

      - name: Archive and Export
        run: |
          xcodebuild -workspace iosApp/iosApp.xcworkspace \
                      -scheme iosApp \
                      -configuration Release \
                      -destination 'generic/platform=iOS' \
                      -archivePath build/iosApp.xcarchive \
                      CODE_SIGN_STYLE=Manual \
                      CODE_SIGN_IDENTITY="Apple Distribution" \
                      PROVISIONING_PROFILE_SPECIFIER="ci_profile" \
                      archive

          xcodebuild -exportArchive \
                      -archivePath build/iosApp.xcarchive \
                      -exportOptionsPlist ExportOptions.plist \
                      -exportPath build/output

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iosApp-${{ github.run_number }}
          path: build/output/iosApp.ipa
          retention-days: 7

      - name: Cleanup
        run: |
          security delete-keychain build.keychain
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/ci_profile.mobileprovision
