name: Check Code Style
on:
  push:
    branches:
      - develop
      - feature/*
      - bugfix/*
      - hotfix/*

jobs:
  check_code_style:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Gradle (includes wrapper validation)
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Copy apikeys.properties from secrets
        run: |
          cd . > keystore/apikey.properties
          echo ${{ secrets.APIKEY_PROPERTIES }} | base64 --decode > configs/apikeys.properties

      - name: Copy CI gradle.properties
        run: mkdir -p ~/.gradle ; cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17
          cache: 'gradle'

      - name: Check Code Style
        run: ./gradlew --no-build-cache ktlintCheck