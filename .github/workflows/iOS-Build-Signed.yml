name: iOS Signed Build (Device)
on:
  workflow_dispatch:  # Only run manually when you need a signed build
  push:
    tags:
      - 'v*'  # Run on version tags

jobs:
  build_ios_signed:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17
          cache: 'gradle'

      - name: Copy apikeys.properties from secrets
        run: |
          mkdir -p configs
          echo "${{ secrets.APIKEY_PROPERTIES }}" | base64 --decode > configs/apikeys.properties

      - name: Copy package_read.properties from secrets (for TrustWallet Core)
        run: |
          mkdir -p configs
          echo "${{ secrets.PACKAGE_READ_PROPERTIES }}" | base64 --decode > configs/package_read.properties

      - name: Copy CI gradle.properties
        run: mkdir -p ~/.gradle ; cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer

      - name: Generate BuildKonfig
        run: ./gradlew -p platform generateBuildKonfig

      - name: Generate dummy framework for CocoaPods
        run: ./gradlew :composeApp:generateDummyFramework

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            iosApp/Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-${{ hashFiles('iosApp/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods dependencies
        run: |
          cd iosApp
          pod install --repo-update

      - name: Build Kotlin Multiplatform module for iOS
        env:
          GPR_USERNAME: ${{ github.actor }}
          GPR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./gradlew :composeApp:compileKotlinIosArm64 --no-daemon

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security import $CERTIFICATE_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Import provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Create provisioning profile directory
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          # Import provisioning profile
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Get UUID and copy to proper location
          PP_UUID=$(grep -a -A 1 UUID $PP_PATH | grep -o "[-A-F0-9]\{36\}")
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision

      - name: Build and Archive iOS app
        run: |
          cd iosApp
          xcodebuild -workspace iosApp.xcworkspace \
            -scheme iosApp \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/iosApp.xcarchive \
            -allowProvisioningUpdates \
            archive

      - name: Verify archive output
        run: |
          if [ -d "$RUNNER_TEMP/iosApp.xcarchive" ]; then
            echo "✅ Archive successful: $RUNNER_TEMP/iosApp.xcarchive"
            ls -la "$RUNNER_TEMP/iosApp.xcarchive"
          else
            echo "❌ Archive failed: xcarchive not found"
            exit 1
          fi

      - name: Export IPA
        env:
          EXPORT_OPTIONS_PLIST: ${{ secrets.IOS_EXPORT_OPTIONS_PLIST }}
        run: |
          # Create export options plist
          EXPORT_OPTS_PATH=$RUNNER_TEMP/ExportOptions.plist
          echo -n "$EXPORT_OPTIONS_PLIST" | base64 --decode -o $EXPORT_OPTS_PATH

          # Export IPA
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/iosApp.xcarchive \
            -exportOptionsPlist $EXPORT_OPTS_PATH \
            -exportPath $RUNNER_TEMP/build

      - name: Verify IPA output
        run: |
          IPA_PATH=$(find $RUNNER_TEMP/build -name "*.ipa" | head -n 1)
          if [ -n "$IPA_PATH" ]; then
            echo "✅ IPA export successful: $IPA_PATH"
            ls -lh "$IPA_PATH"
          else
            echo "❌ IPA export failed: .ipa file not found"
            ls -la $RUNNER_TEMP/build/
            exit 1
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: iosApp-signed-${{ github.run_number }}
          path: ${{ runner.temp }}/build/*.ipa
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-signed-build-logs-${{ github.run_number }}
          path: |
            ${{ runner.temp }}/DerivedData/Logs/
            iosApp/build/
          retention-days: 3
          if-no-files-found: ignore

      - name: Clean up keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security delete-keychain $KEYCHAIN_PATH || true
