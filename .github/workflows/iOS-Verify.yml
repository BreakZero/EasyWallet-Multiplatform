name: iOS Platform Verify
on:
  push:
    branches:
      - develop
      - feature/*
      - bugfix/*
      - hotfix/*
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

jobs:
  verify_ios:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17
          cache: 'gradle'

      - name: Copy apikeys.properties from secrets
        run: |
          mkdir -p configs
          echo "${{ secrets.APIKEY_PROPERTIES }}" | base64 --decode > configs/apikeys.properties

      - name: Copy package_read.properties from secrets
        run: |
          mkdir -p configs
          echo "${{ secrets.PACKAGE_READ_PROPERTIES }}" | base64 --decode > configs/package_read.properties

      - name: Copy CI gradle.properties
        run: mkdir -p ~/.gradle ; cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer

      - name: Setup iOS Simulator
        run: |
          # Show available runtimes and devices for debugging
          echo "=== Available Runtimes ==="
          xcrun simctl list runtimes
          echo "=== Available Devices ==="
          xcrun simctl list devices available
          
          # Try to create a simulator with iOS 18.1, fallback to available version
          if xcrun simctl list runtimes | grep -q "iOS 18.1"; then
            echo "iOS 18.1 runtime found"
          else
            echo "iOS 18.1 runtime not found, checking for alternatives..."
          fi

      # Step 1: Verify BuildKonfig generation
      - name: Generate BuildKonfig
        run: ./gradlew -p platform generateBuildKonfig

      # Step 2: Verify Kotlin compilation for iOS targets
      - name: Compile Kotlin for iOS (Arm64)
        env:
          GPR_USERNAME: ${{ github.actor }}
          GPR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./gradlew :composeApp:compileKotlinIosArm64 --no-daemon

      - name: Compile Kotlin for iOS (Simulator Arm64)
        env:
          GPR_USERNAME: ${{ github.actor }}
          GPR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./gradlew :composeApp:compileKotlinIosSimulatorArm64 --no-daemon

      # Step 3: Verify framework generation for CocoaPods
      - name: Generate iOS Framework
        run: ./gradlew :composeApp:generateDummyFramework

      # Step 4: Verify CocoaPods setup
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            iosApp/Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-${{ hashFiles('iosApp/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods dependencies
        run: |
          cd iosApp
          pod install --repo-update

      # Step 5: Verify Xcode project builds (compile only, no app bundle)
      - name: Verify Xcode Build
        run: |
          cd iosApp
          xcodebuild -workspace iosApp.xcworkspace \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build-for-testing

      - name: ✅ iOS Platform Verification Complete
        run: |
          echo "All iOS platform checks passed!"
          echo "- BuildKonfig generated"
          echo "- Kotlin compiled for iOS Arm64"
          echo "- Kotlin compiled for iOS Simulator Arm64"
          echo "- iOS Framework generated"
          echo "- CocoaPods dependencies installed"
          echo "- Xcode project builds successfully"

      # Upload logs on failure
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-verify-logs-${{ github.run_number }}
          path: |
            ${{ runner.temp }}/**
            iosApp/build/
          retention-days: 3
          if-no-files-found: ignore
